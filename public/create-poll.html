<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>建立問卷 | What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <main id="main-content" class="mvp-shell">
      <nav class="public-nav" aria-label="網站導覽">
        <a href="/">首頁</a>
        <a href="/polls/new" aria-current="page">建立問卷</a>
      </nav>
      <p class="mvp-brand">What We Wonder · 公開 MVP</p>
      <h1>建立問卷</h1>
      <p class="mvp-lead">建立完成後，請複製<strong>投票連結</strong>給參與者，並可用<strong>結果連結</strong>查看公開統計。發布後無法在此編輯，若有錯字請刪除並重新建立。</p>
      <form id="create-poll-form" class="mvp-form">
        <label for="poll-title">問卷標題</label>
        <input id="poll-title" name="title" maxlength="200" required autocomplete="off">

        <label for="poll-description">補充說明（選填）</label>
        <textarea id="poll-description" name="description" rows="4" autocomplete="off"></textarea>

        <fieldset>
          <legend>選項（至少 2 項，最多 6 項）</legend>
          <label class="option-label" for="poll-option-1">選項 1</label>
          <input id="poll-option-1" name="option" required autocomplete="off">
          <label class="option-label" for="poll-option-2">選項 2</label>
          <input id="poll-option-2" name="option" required autocomplete="off">
          <label class="option-label" for="poll-option-3">選項 3（選填）</label>
          <input id="poll-option-3" name="option" autocomplete="off">
          <label class="option-label" for="poll-option-4">選項 4（選填）</label>
          <input id="poll-option-4" name="option" autocomplete="off">
          <label class="option-label" for="poll-option-5">選項 5（選填）</label>
          <input id="poll-option-5" name="option" autocomplete="off">
          <label class="option-label" for="poll-option-6">選項 6（選填）</label>
          <input id="poll-option-6" name="option" autocomplete="off">
        </fieldset>

        <button
          id="create-poll-submit"
          type="submit"
          class="mvp-btn-primary"
          aria-describedby="form-message"
        >建立問卷</button>
      </form>
      <p id="form-message" role="status" aria-live="polite"></p>
      <section
        id="success-panel"
        role="region"
        aria-label="問卷建立成功"
        aria-live="polite"
        hidden
      ></section>
    </main>
    <script type="module" src="/frontend/create-poll-page.js"></script>
  </body>
</html>
