<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>建立問卷 | What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active="create"></header>
    <main id="main-content" class="mvp-page mvp-shell">
      <h1>建立問卷</h1>
      <p class="mvp-lead">發布後無法在此編輯題目或選項。完成後請複製投票連結分享。</p>

      <div class="mvp-founder-callout" role="note">
        <strong>發起者須知</strong>
        <ul>
          <li>收票中<strong>看不到</strong>即時票數或選項分布。</li>
          <li>收票中若要停止，請用「<strong>取消</strong>」，不是「下架」。</li>
          <li>結果公開後約 <strong>5 天</strong>公開鎖定期，期間無法下架或修改。
            <span class="mvp-help" tabindex="0" role="button" aria-label="鎖定期說明">
              <span class="mvp-help-icon" aria-hidden="true">?</span>
              <span class="mvp-help-tip" role="tooltip">鎖定期內不可編輯、下架、刪除、重新開放投票或隱藏結果。</span>
            </span>
          </li>
        </ul>
      </div>

      <div class="mvp-form-card">
        <form id="create-poll-form" class="mvp-form">
          <label for="poll-title">問卷標題</label>
          <input id="poll-title" name="title" maxlength="200" required autocomplete="off">

          <label for="poll-description">補充說明（選填）</label>
          <textarea id="poll-description" name="description" rows="3" autocomplete="off"></textarea>

          <fieldset>
            <legend>選項（至少 2 項，最多 6 項）</legend>
            <label class="option-label" for="poll-option-1">選項 1</label>
            <input id="poll-option-1" name="option" required autocomplete="off">
            <label class="option-label" for="poll-option-2">選項 2</label>
            <input id="poll-option-2" name="option" required autocomplete="off">
            <label class="option-label" for="poll-option-3">選項 3（選填）</label>
            <input id="poll-option-3" name="option" autocomplete="off">
            <label class="option-label" for="poll-option-4">選項 4（選填）</label>
            <input id="poll-option-4" name="option" autocomplete="off">
            <label class="option-label" for="poll-option-5">選項 5（選填）</label>
            <input id="poll-option-5" name="option" autocomplete="off">
            <label class="option-label" for="poll-option-6">選項 6（選填）</label>
            <input id="poll-option-6" name="option" autocomplete="off">
          </fieldset>

          <fieldset class="policy-future-fields" disabled aria-disabled="true">
            <legend>統計截止與結果公開（尚未啟用）</legend>
            <p class="policy-panel-text policy-panel-muted">
              MVP 由系統設定預設統計期。未來可指定截止／公開時間。
              <span class="mvp-help" tabindex="0" role="button" aria-label="公開時間">
                <span class="mvp-help-icon" aria-hidden="true">?</span>
                <span class="mvp-help-tip" role="tooltip">MVP：截止時間即結果公開時間。</span>
              </span>
            </p>
            <label for="poll-close-at">截止與結果公開時間</label>
            <input id="poll-close-at" name="close_at" type="datetime-local" disabled>
          </fieldset>

          <fieldset class="policy-future-fields" disabled aria-disabled="true">
            <legend>投票資格（尚未啟用）</legend>
            <p class="policy-panel-text policy-panel-muted">
              年齡依自行填寫的出生年／月判斷，非官方驗證。
              <span class="mvp-help" tabindex="0" role="button" aria-label="資格說明">
                <span class="mvp-help-icon" aria-hidden="true">?</span>
                <span class="mvp-help-tip" role="tooltip">資格為使用者自行宣告，非政府驗證。</span>
              </span>
            </p>
            <label for="poll-eligibility-age">年齡區間（示範）</label>
            <input id="poll-eligibility-age" type="text" disabled placeholder="例如 18–30">
            <label for="poll-eligibility-region">地區（示範）</label>
            <input id="poll-eligibility-region" type="text" disabled placeholder="例如 高雄市">
          </fieldset>

          <button
            id="create-poll-submit"
            type="submit"
            class="mvp-btn-primary"
            aria-describedby="form-message"
          >建立問卷</button>
        </form>
      </div>

      <p id="form-message" role="status" aria-live="polite"></p>
      <section
        id="success-panel"
        role="region"
        aria-label="問卷建立成功"
        aria-live="polite"
        hidden
      ></section>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
    <script type="module" src="/frontend/create-poll-page.js"></script>
  </body>
</html>
