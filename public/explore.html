<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>探索問卷｜What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active="explore"></header>
    <main
      id="main-content"
      class="mvp-page explore-page explore-feed"
      data-explore-feed="freshness-only"
      aria-labelledby="explore-heading"
    >
      <p class="mvp-demo-nav-switch" role="note">
        切換瀏覽身分（展示用）：
        <a href="?nav=guest">訪客</a>
        ·
        <a href="?nav=logged-in-mock">登入後</a>
      </p>
      <header class="mvp-page-intro">
        <h1 id="explore-heading">探索問卷</h1>
        <p class="mvp-lead" id="explore-page-lead">
          依最近發布顯示目前可公開探索、仍在收集中的問卷。不提供熱門、票數、個人化或榜單排序；列表亦不顯示票數或結果百分比。
        </p>
        <p class="mvp-meta" id="explore-page-lead-links">
          <a id="explore-home-cta" href="/">返回首頁</a>
          ·
          <a href="/faq">常見問題</a>
        </p>
      </header>

      <p id="explore-status" class="mvp-form-hint" role="status" aria-live="polite">
        載入探索列表中，請稍候。
      </p>

      <p id="explore-error" class="mvp-error-panel" role="alert" hidden></p>

      <div id="explore-feed-list" class="mvp-card-grid" aria-busy="true"></div>

      <div id="explore-empty" class="mvp-empty-state" hidden>
        <p>目前沒有正在收集中的公開問卷。</p>
        <p class="mvp-meta">你可以先發起一則問卷並分享投票連結。</p>
        <a class="mvp-btn mvp-btn-secondary" href="/polls/new?live=1">建立問卷</a>
      </div>

      <button
        type="button"
        id="explore-load-more"
        class="mvp-btn mvp-btn-secondary"
        hidden
      >
        載入更多
      </button>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
    <script type="module" src="/frontend/explore-page.js"></script>
  </body>
</html>
