<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>探索問卷｜What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active="explore"></header>
    <main id="main-content" class="mvp-page explore-placeholder explore-page" aria-labelledby="explore-heading">
      <h1 id="explore-heading">探索問卷</h1>
      <p class="mvp-lead">
        靜態示意列表，尚未連線真實 API。排序不依收票中票數或趨勢。
      </p>

      <div class="mvp-filter-row" aria-label="篩選（視覺示意）">
        <span class="mvp-filter-chip is-active">全部</span>
        <span class="mvp-filter-chip">收票中</span>
        <span class="mvp-filter-chip">結果已公開</span>
        <span class="mvp-filter-chip">生活</span>
        <span class="mvp-filter-chip">職場</span>
      </div>

      <div class="mvp-card-grid">
        <article class="mvp-poll-card">
          <div class="mvp-poll-card-top">
            <h3>每日咖啡攝取量落在哪個區間？</h3>
            <span class="mvp-badge mvp-badge-collecting">收票中</span>
          </div>
          <p class="mvp-poll-card-meta">生活 · 2 天後截止</p>
          <p class="mvp-poll-card-hint">
            不顯示票數／趨勢
            <span class="mvp-help" tabindex="0" role="button" aria-label="說明">
              <span class="mvp-help-icon" aria-hidden="true">?</span>
              <span class="mvp-help-tip" role="tooltip">探索列表在收票中不顯示領先選項或成長趨勢。</span>
            </span>
          </p>
          <div class="mvp-poll-card-footer">
            <a class="mvp-btn mvp-btn-primary" href="/vote/00000000-0000-4000-8000-000000000001">前往投票</a>
          </div>
        </article>

        <article class="mvp-poll-card">
          <div class="mvp-poll-card-top">
            <h3>團隊站立會議最適合的頻率？</h3>
            <span class="mvp-badge mvp-badge-revealed">結果已公開</span>
          </div>
          <p class="mvp-poll-card-meta">職場 · 可查看聚合結果</p>
          <div class="mvp-poll-card-footer">
            <a class="mvp-btn mvp-btn-secondary" href="/results/00000000-0000-4000-8000-000000000002">查看結果</a>
          </div>
        </article>
      </div>

      <div class="mvp-empty-state" style="margin-top:1rem">
        <div class="mvp-mascot mvp-mascot--idle" aria-hidden="true">
          <span class="mvp-mascot-body"><span class="mvp-mascot-face"></span><span class="mvp-mascot-prop"></span></span>
        </div>
        <p>更多問卷將於列表 API 就緒後顯示。目前亦可透過分享連結參與。</p>
        <a class="mvp-btn mvp-btn-secondary" href="/polls/new" style="margin-top:0.75rem">發起提問</a>
      </div>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
  </body>
</html>
