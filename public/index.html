      <h1>大家想知道</h1>
      <p class="mvp-lead">隱私優先的公開問卷雛形。目前以<strong>分享連結</strong>流通：建立問卷後複製<strong>投票連結</strong>與<strong>結果連結</strong>給朋友，無需登入。</p>

        <li><strong>結果</strong> — 查看顯示安全的統計摘要（非原始票數）</li>
      </ol>
