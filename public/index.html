<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大家想知道｜What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active="home"></header>
    <main
      id="main-content"
      class="mvp-page home-swipe"
      data-auth-banner="off"
      data-home-swipe-feed="collecting-only"
      aria-labelledby="home-heading"
    >
      <h1 id="home-heading" class="mvp-sr-only">大家想知道 — 匿名問卷卡片</h1>

      <p
        id="home-swipe-status"
        class="mvp-sr-only"
        role="status"
        aria-live="polite"
      >
        載入問卷卡片中，請稍候。
      </p>

      <section
        id="home-swipe-stage"
        class="home-swipe-stage"
        aria-label="問卷卡片"
        aria-roledescription="可向下滑動瀏覽的問卷卡片列表"
        aria-busy="true"
      >
        <article class="home-swipe-card home-swipe-card--skeleton" aria-hidden="true">
          <span class="home-swipe-skeleton-badge"></span>
          <span class="home-swipe-skeleton-line home-swipe-skeleton-line--lg"></span>
          <span class="home-swipe-skeleton-line"></span>
          <span class="home-swipe-skeleton-cta"></span>
        </article>
      </section>

      <button
        type="button"
        id="home-swipe-load-more"
        class="mvp-btn mvp-btn-secondary home-swipe-load-more"
        hidden
      >
        載入更多
      </button>

      <div id="home-swipe-empty" class="home-swipe-panel mvp-empty-state" hidden></div>

      <div
        id="home-swipe-error"
        class="home-swipe-panel mvp-error-panel"
        role="alert"
        hidden
      ></div>

      <nav class="home-swipe-actions" aria-label="首頁操作">
        <a
          id="home-create-cta"
          class="mvp-btn mvp-btn-primary home-swipe-create-cta"
          href="/polls/new"
        >發起提問</a>
        <p class="home-swipe-access mvp-meta">
          <a id="home-register-cta" href="/registration">註冊</a>
          ·
          <a id="home-login-cta" href="/login">登入</a>
          ·
          <a id="home-explore-fallback" href="/explore">改用列表瀏覽</a>
        </p>
      </nav>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
    <script type="module" src="/frontend/public-mvp-home.js"></script>
  </body>
</html>
