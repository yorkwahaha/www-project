      <h1>大家想知道</h1>
      <p class="mvp-lead">隱私優先的公開問卷雛形。建立問卷後可分享<strong>投票連結</strong>與<strong>結果連結</strong>給朋友試用，無需登入。</p>
      <a class="mvp-cta" href="/polls/new">建立問卷</a>
      <ol class="flow">
        <li><strong>建立</strong> — 填寫標題與選項，完成後複製連結</li>
        <li><strong>投票</strong> — 參與者開啟投票頁選擇一個選項</li>
        <li><strong>結果</strong> — 查看顯示安全的統計摘要（非原始票數）</li>
      </ol>
      <p class="note">本 MVP 不提供問卷列表、熱門排行、登入帳號、分類選擇或管理後台介面。</p>
