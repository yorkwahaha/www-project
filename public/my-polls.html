<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的問卷（示意）｜What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="logged-in-mock" data-active=""></header>
    <main id="main-content" class="mvp-page">
      <p class="mvp-demo-nav-switch" role="note">
        導覽示範：
        <a href="?nav=guest">訪客</a>
        ·
        <a href="?nav=logged-in-mock">登入後</a>
      </p>
      <p class="mvp-mock-banner" role="note">
        發起者儀表板為靜態示意；額度與品質點數未連線後端，不代表真實帳號。
      </p>
      <h1>我的問卷</h1>
      <p class="mvp-lead">收票中看不到票數；鎖定期內無法下架或編輯。</p>

      <div class="mvp-quota-card mvp-quota-card--mock" aria-label="發起額度（示意，未實作）">
        <div class="mvp-quota-stat">
          <strong>—</strong>
          <span>發起者等級</span>
        </div>
        <div class="mvp-quota-stat">
          <strong>— / —</strong>
          <span>今日發起額度</span>
        </div>
        <div class="mvp-quota-stat">
          <strong>—</strong>
          <span>品質點數</span>
        </div>
      </div>

      <div class="mvp-dash-table-wrap">
        <table class="mvp-dash-table">
          <thead>
            <tr>
              <th>標題</th>
              <th>狀態</th>
              <th>時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>週末休閒活動偏好</strong></td>
              <td><span class="mvp-badge mvp-badge-collecting">收票中</span></td>
              <td>06/20 公開結果</td>
              <td>
                <a class="mvp-btn mvp-btn-ghost mvp-btn-sm" href="#">分享</a>
                <button type="button" class="mvp-btn mvp-btn-sm mvp-btn-accent-outline" disabled title="示意">取消問卷</button>
              </td>
            </tr>
            <tr>
              <td><strong>遠端工作天數調查</strong></td>
              <td><span class="mvp-badge mvp-badge-locked">公開鎖定期</span></td>
              <td>鎖定至 06/02</td>
              <td class="toolbar-disabled">
                <span class="mvp-meta">無法下架／刪除／修改</span>
              </td>
            </tr>
            <tr>
              <td><strong>科技產品期待度</strong></td>
              <td><span class="mvp-badge mvp-badge-muted">鎖定期已結束</span></td>
              <td>可下架</td>
              <td>
                <button type="button" class="mvp-btn mvp-btn-secondary mvp-btn-sm" disabled title="示意">下架問卷</button>
              </td>
            </tr>
            <tr>
              <td><strong>春季旅遊意願</strong></td>
              <td><span class="mvp-badge mvp-badge-danger">已取消</span></td>
              <td>—</td>
              <td><span class="mvp-meta">無公開結果</span></td>
            </tr>
            <tr>
              <td><strong>路面改善優先順序</strong></td>
              <td><span class="mvp-badge mvp-badge-muted">已下架</span></td>
              <td>鎖定期後</td>
              <td><span class="mvp-meta">此問卷已結束公開鎖定期，並由發起者下架。</span></td>
            </tr>
          </tbody>
        </table>
      </div>

      <aside class="mvp-side-panel" style="margin-top:1rem">
        <div class="mvp-mascot mvp-mascot--locked" style="width:3rem;height:3rem;margin-bottom:0.5rem" aria-hidden="true">
          <span class="mvp-mascot-body"><span class="mvp-mascot-face"></span><span class="mvp-mascot-prop"></span></span>
        </div>
        <h2>發起者看不到期中結果</h2>
        <p class="mvp-meta" style="margin:0">收票中不顯示票數、分布、排名或趨勢。</p>
      </aside>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
  </body>
</html>
