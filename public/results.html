<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投票結果 | What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active=""></header>
    <main id="main-content" class="mvp-page mvp-shell">
      <p class="mvp-demo-nav-switch" role="note">
        切換瀏覽身分（展示用）：
        <a href="?nav=guest">訪客</a>
        ·
        <a href="?nav=logged-in-mock">登入後</a>
      </p>
      <p class="mvp-brand">公開結果（唯讀）</p>
      <h1 id="page-title" aria-live="polite">公開結果（唯讀）</h1>
      <p class="mvp-meta" style="margin-top:-0.35rem">
        <strong>目前為公開展示版</strong>：以範例展示各狀態；收集中不顯示票數。
        優質題目依多種訊號判定，非單純按讚。<a href="/faq">常見問題</a>
      </p>

      <div id="result-state-preview-links" class="mvp-preview-links-host" hidden></div>

      <section
        id="results-intro"
        class="results-intro"
        aria-label="公開結果頁說明"
        hidden
      ></section>

      <div
        id="result-display"
        role="region"
        aria-label="投票結果統計"
        aria-live="polite"
      >載入中</div>

      <section id="error-panel" role="alert" aria-live="assertive" hidden></section>
      <section id="public-notices" aria-label="修正公告" hidden></section>

      <nav id="bottom-nav" class="public-nav mvp-result-footer" aria-label="頁面導覽"></nav>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
    <script type="module" src="/frontend/result-page.js"></script>
  </body>
</html>
