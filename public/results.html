<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投票結果 | What We Wonder</title>
    <style>
      body {
        max-width: 44rem;
        margin: 2rem auto;
        padding: 0 1rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }

      .result-option {
        margin: 1rem 0;
        padding: 1rem;
        border: 1px solid #d0d0d0;
        border-radius: 0.5rem;
      }

      #public-notices {
        margin: 1rem 0;
      }

      .public-notice {
        margin: 0.75rem 0;
        padding: 0.875rem 1rem;
        border-left: 0.25rem solid #8a7b52;
        background: #faf8f2;
      }

      .public-notice-label,
      .public-notice-created-at {
        color: #625b4b;
        font-size: 0.875rem;
      }

      .public-notice-title {
        margin: 0.25rem 0;
        font-size: 1rem;
      }

      .public-notice-body {
        white-space: pre-wrap;
      }

      .public-nav {
        margin-top: 2rem;
        font-size: 0.95rem;
      }

      .public-nav a + a {
        margin-left: 0.75rem;
      }

      #error-panel {
        margin: 1rem 0;
        padding: 1rem;
        border: 1px solid #e0c9c9;
        background: #fdf6f6;
      }

      .panel-heading {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
      }

      .panel-message {
        margin: 0 0 0.75rem;
      }

      #bottom-nav a {
        display: inline-block;
        margin-top: 0.5rem;
        margin-right: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="page-title">投票結果</h1>
      <section id="error-panel" aria-live="polite" hidden></section>
      <section id="public-notices" aria-label="修正公告" hidden></section>
      <div id="result-display" aria-live="polite">載入中</div>
      <nav id="bottom-nav" class="public-nav" aria-label="頁面導覽">
        <a href="/">首頁</a>
        <a href="/polls/new">建立問卷</a>
      </nav>
    </main>
    <script type="module" src="/frontend/result-page.js"></script>
  </body>
</html>
