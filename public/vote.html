<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>參與投票 | What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <header id="site-header" data-nav="guest" data-active=""></header>
    <main id="main-content" class="mvp-page mvp-shell">
      <p class="mvp-demo-nav-switch" role="note">
        導覽示範：
        <a href="?nav=guest">訪客</a>
        ·
        <a href="?nav=logged-in-mock">登入後</a>
      </p>
      <div class="mvp-vote-layout">
        <div class="mvp-vote-main">
          <p class="mvp-brand">參與投票</p>
          <h1 id="poll-title" aria-live="polite">載入中</h1>
          <p id="poll-description"></p>

          <p class="mvp-mock-banner" role="note">
            正式環境會載入問卷 API。預覽狀態請加
            <code>?ui_state=ineligible</code>、<code>followed</code>、<code>cancelled</code> 等。
          </p>

          <div id="vote-collecting-notice" class="mvp-policy-panel mvp-policy-panel-compact" aria-label="收票規則">
            <div class="mvp-policy-panel-header">
              <h2 class="mvp-policy-panel-title" style="font-size:1rem;margin:0">收票中</h2>
              <span class="mvp-badge mvp-badge-collecting">盲測</span>
            </div>
            <p class="policy-panel-text" style="margin:0">
              不顯示票數或百分比；結果於統計結束後公開。
            </p>
          </div>

          <div id="vote-policy-panels" class="vote-policy-panels" hidden></div>

          <form id="vote-form" class="mvp-form" hidden aria-labelledby="poll-title">
            <fieldset>
              <legend>請選擇一個選項</legend>
              <div id="poll-options" role="radiogroup" aria-label="投票選項"></div>
            </fieldset>
            <button
              id="vote-submit"
              type="submit"
              class="mvp-btn-primary"
              aria-describedby="form-message"
            >送出投票</button>
          </form>

          <p id="form-message" role="status" aria-live="polite"></p>
          <section id="error-panel" role="alert" aria-live="assertive" hidden></section>
          <section
            id="success-panel"
            role="region"
            aria-label="投票成功"
            aria-live="polite"
            hidden
          ></section>
        </div>

        <aside class="mvp-side-panel mvp-side-panel-compact" aria-label="資格與關注" id="vote-side-panel">
          <div class="mvp-mascot mvp-mascot--followed" style="width:3rem;height:3rem;margin-bottom:0.5rem" aria-hidden="true">
            <span class="mvp-mascot-body"><span class="mvp-mascot-face"></span><span class="mvp-mascot-prop"></span></span>
          </div>
          <h2>關注結果（站內通知示意）</h2>
          <p class="mvp-meta" style="margin:0 0 0.5rem">
            不符合資格或暫不投票時，可關注結果公開通知（不含 Email／推播）。
          </p>
          <button type="button" class="mvp-btn-mock" disabled aria-disabled="true">關注結果（示意，未連線）</button>
          <p class="mvp-follow-mock-note" style="margin:0.35rem 0 0;font-size:0.82rem;color:var(--mvp-muted);font-style:italic">
            不會儲存關注或發送真實通知。
          </p>
          <ul class="mvp-preview-links">
            <li><a href="?ui_state=ineligible">預覽：不符合資格</a></li>
            <li><a href="?ui_state=followed">預覽：已關注</a></li>
            <li><a href="?ui_state=cancelled">預覽：已取消</a></li>
          </ul>
        </aside>
      </div>
    </main>
    <script type="module" src="/frontend/public-mvp-layout.js"></script>
    <script type="module" src="/frontend/vote-page.js"></script>
  </body>
</html>
