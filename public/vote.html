<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>參與投票 | What We Wonder</title>
    <link rel="stylesheet" href="/frontend/public-mvp.css">
  </head>
  <body class="mvp-body">
    <a class="skip-link" href="#main-content">跳到主要內容</a>
    <main id="main-content" class="mvp-shell">
      <nav class="public-nav" aria-label="網站導覽">
        <a href="/">首頁</a>
        <a href="/explore">探索（尚未開放）</a>
        <a href="/polls/new">建立問卷</a>
      </nav>
      <p class="mvp-brand">What We Wonder · 公開 MVP</p>
      <h1 id="poll-title" aria-live="polite">載入中</h1>
      <p id="poll-description"></p>
      <p class="mvp-meta">選擇一個選項並送出；完成後可前往結果頁查看公開統計。</p>
      <form id="vote-form" class="mvp-form" hidden aria-labelledby="poll-title">
        <fieldset>
          <legend>請選擇一個選項（可用方向鍵或 Tab 切換）</legend>
          <div id="poll-options" role="radiogroup" aria-label="投票選項"></div>
        </fieldset>
        <button
          id="vote-submit"
          type="submit"
          class="mvp-btn-primary"
          aria-describedby="form-message"
        >送出投票</button>
      </form>
      <p id="form-message" role="status" aria-live="polite"></p>
      <section id="error-panel" role="alert" aria-live="assertive" hidden></section>
      <section
        id="success-panel"
        role="region"
        aria-label="投票成功"
        aria-live="polite"
        hidden
      ></section>
    </main>
    <script type="module" src="/frontend/vote-page.js"></script>
  </body>
</html>
